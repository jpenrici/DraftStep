<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="400" height="350" viewBox="0 0 400 350">
  <g id="layer-default" inkscape:label="default" inkscape:groupmode="layer">
  </g>
  <g id="layer-base" inkscape:label="base" inkscape:groupmode="layer">
    <rect x="100" y="140" width="200" height="160" stroke="#555555" stroke-width="2" fill="#F5E6C8"/>
  </g>
  <g id="layer-roof" inkscape:label="roof" inkscape:groupmode="layer">
    <rect x="100" y="45" width="100" height="95" stroke="#8B3A3A" stroke-width="1" fill="#C0392B"/>
    <rect x="200" y="45" width="100" height="95" stroke="#8B3A3A" stroke-width="1" fill="#C0392B"/>
    <rect x="195" y="40" width="10" height="10" stroke="#8B3A3A" stroke-width="1" fill="#7B2929"/>
  </g>
  <g id="layer-details" inkscape:label="details" inkscape:groupmode="layer">
    <g id="group-door">
      <rect x="175" y="220" width="50" height="80" stroke="#5D3A1A" stroke-width="1" fill="#7B4F2E"/>
    </g>
    <g id="group-window">
      <rect x="115" y="160" width="50" height="50" stroke="#2980B9" stroke-width="1" fill="#AED6F1"/>
    </g>
  </g>
  <g id="layer-path" inkscape:label="path" inkscape:groupmode="layer">
    <line x1="200" y1="300" x2="200" y2="350" stroke="#888888" stroke-width="3" fill="none"/>
    <line x1="170" y1="300" x2="230" y2="300" stroke="#888888" stroke-width="3" fill="none"/>
    <line x1="170" y1="310" x2="230" y2="310" stroke="#888888" stroke-width="3" fill="none"/>
  </g>
</svg>
